{% if page.hierarchy_level %}
  <!-- Site Hierarchy Navigation -->
  <div style="background-color: #f5f5f5; border-bottom: 1px solid #ddd; padding: 12px 15px; margin: 0 0 20px 0;">
    {% if page.parent_url %}
      <a href="{{ page.parent_url | relative_url }}" style="color: #0366d6; text-decoration: none; font-size: 14px;">
        ↑ Up to {{ page.hierarchy_parent_title }}
      </a>
    {% endif %}
  </div>
{% endif %}
